<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{{ page_title or "16S rRNA Sequencing Report" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
/* Visual A4 preview (screen) */
    :root {
      --page-w: 210mm;
      --page-h: 297mm;
    }
    
    * {
      box-sizing: border-box;
    }
    
    .page.A4 {
      width: var(--page-w);
      min-height: var(--page-h);
      margin: 10px auto;
      background: #fff;
      box-shadow: 0 0 10px #ccc;
      box-sizing: border-box;
      padding: 12mm;
      break-after: page;
    }
    
    .page-break {
      break-before: page;
    }
    
    /*    .summary-fit {  */
    /* 	page-break-inside: avoid;  */
    /* } */
    .title {
      text-align: center;
      font-size: 1.8em;
      font-weight: 700;
      margin: 8px 0 12px;
    }
    
    .subtle {
      color: #333;
    }
    
    .chip {
      border: 1px solid #ddd;
      padding: 6px 10px;
      border-radius: 8px;
      background: #fafafa;
      display: inline-block;
      margin: 4px 6px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
    }
    
    th,
    td {
      padding: 8px;
      text-align: left;
      border: 1px solid #000;
    }
    
    th {
      background: #e5e8eb;
    }
    
    .blue th {
      background: #cce5ff;
    }
    
    .highlight td {
      background: #f8d7da !important;
      font-size: 20px;
      text-align: center;
    }
    
    .pass {
      background: #c7e9c0;
    }
    
    .fail {
      background: #f8d7da;
    }
    /* Set running strings once per document */
    .set-tested {
      string-set: tested content();
    }
    
    .set-reported {
      string-set: reported content();
    }
    
    /* Repeat table headers and keep blocks together when possible */
    thead {
      display: table-header-group;
    }
    
    tfoot {
      display: table-footer-group;
    }
    
    h2,
    h3 {
      break-after: avoid;
    }
    
    tr,
    img,
    pre,
    code,
    .block {
      break-inside: avoid;
    }
    
    /* Print polish */
    /* @media print { */
    /*   html, body { background: #fff; } */
    /*   .page.A4 { margin: 0; box-shadow: none; } */
    /* } */
    
    /* New stuff from chatGPT */
    /* Visual A4 preview (screen only) */
    @media screen {
      :root {
        --page-w: 210mm;
        --page-h: 297mm;
      }
    
      .page.A4 {
        width: var(--page-w);
        min-height: var(--page-h);
        margin: 10px auto;
        background: #fff;
        box-shadow: 0 0 10px #ccc;
        padding: 12mm;
      }
    }
    
    /* Print layout: let @page handle size + margins */
    @page {
      size: A4;
      margin: 14mm 14mm 18mm 14mm;
    
      @bottom-left {
        content: "Tested: " string(tested);
      }
    
      @bottom-center {
        content: "Reported: " string(reported);
      }
    
      @bottom-right {
        content: "Page " counter(page) " of " counter(pages);
      }
    }
    
    @media print {
    
      html,
      body {
        background: #fff;
      }
    
      .page.A4 {
        width: auto;
        /* <-- key: no fixed width */
        min-height: auto;
        margin: 0;
        /* no extra margins besides @page */
        padding: 0;
        /* rely on @page margins instead */
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <!-- Running string setters (picked up by @page) -->
  <div class="set-tested"   style="height:0; overflow:hidden;">{{ dates.tested or dates.collected or "—" }}</div>
  <div class="set-reported" style="height:0; overflow:hidden;">{{ dates.reported or "—" }}</div>

  {% block content %}{% endblock %}
</body>
</html>
