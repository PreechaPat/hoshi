line-length = 88
indent-width = 4

target-version = "py312"

[lint]
select = ["E4", "E7", "E9", "F"] # F is pyflakes
fixable = ["ALL"]
unfixable = []

[format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"
